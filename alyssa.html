<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Only for ALYSSA</title>
<style>
body {
  margin: 0;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  background: linear-gradient(135deg, #1e1e2f, #ff4d6d);
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  color: white;
  overflow: hidden;
}
.container { text-align: center; z-index: 2; max-width: 90%; }
h1 { margin-bottom: 20px; }
button {
  padding: 12px 25px;
  border-radius: 30px;
  border: none;
  background: white;
  color: #ff4d6d;
  cursor: pointer;
  margin: 10px;
  transition: transform 0.2s;
}
button:hover { transform: scale(1.1); }
#photo { display: none; margin-top: 20px; max-width: 80%; border-radius: 20px; }
#btn2 { display: none; }
#hamster-button { margin-left: 10px; font-size: 14px; display: none; position: relative; z-index: 3; }
#chat {
  display: none;
  margin-top: 20px;
  width: 300px;
  max-width: 90%;
  background: #111;
  padding: 15px;
  border-radius: 20px;
  display: flex;
  flex-direction: column;
  gap: 10px;
}
.bubble {
  padding: 10px 15px;
  border-radius: 20px;
  max-width: 80%;
  font-size: 14px;
  opacity: 0;
  transform: translateY(20px);
  animation: fadeInUp 0.5s forwards;
  position: relative;
  white-space: pre-wrap;
}
.me { background: #ff69b4; align-self: flex-end; margin-left: auto; }
.typing {
  width: 60px;
  height: 12px;
  border-radius: 10px;
  background: rgba(255,255,255,0.6);
  display: flex;
  gap: 4px;
  justify-content: center;
  align-items: center;
  padding: 4px 8px;
}
.dot { width: 6px; height: 6px; background: white; border-radius: 50%; animation: blink 1s infinite; }
.dot:nth-child(2) { animation-delay: 0.2s; }
.dot:nth-child(3) { animation-delay: 0.4s; }
@keyframes blink { 0%, 80%, 100% { opacity: 0; } 40% { opacity: 1; } }
@keyframes fadeInUp { to { opacity: 1; transform: translateY(0); } }
canvas { position: absolute; top: 0; left: 0; }
.emoji {
  position: absolute;
  font-size: 20px;
  animation: floatUp 2s forwards;
}
@keyframes floatUp {
  0% { transform: translateY(0); opacity: 1; }
  100% { transform: translateY(-100px) rotate(360deg); opacity: 0; }
}
</style>
</head>
<body>

<canvas id="canvas"></canvas>

<div class="container">
  <h1>I have to tell you something ALYSSA..</h1>
  <button id="btn1" onclick="firstClick()">Click Me</button>

  <div style="display:flex; justify-content:center; align-items:center; position:relative;">
    <img id="photo" src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRLRRfY0XBCXPq8taDyk1mQfSWZOl0GOJnob6Q4YKQSYg&s">
    <button id="hamster-button" onclick="hamsterConfetti()" title="Click me for more confetti!">🎉 Hamster Party</button>
  </div>

  <br>
  <button id="btn2" onclick="secondClick()">Open Message 💬</button>

  <div id="chat"></div>
</div>

<script>
function firstClick() {
  document.getElementById("photo").style.display = "block";
  document.getElementById("btn1").style.display = "none";
  document.getElementById("btn2").style.display = "inline-block";
  document.getElementById("hamster-button").style.display = "inline-block";
  startConfetti();
}

function hamsterConfetti() {
  // Πετάει confetti
  for (let i = 0; i < 50; i++) pieces.push(createPiece());

  // Πετάει και emojis
  const container = document.getElementById("photo").parentElement;
  const emojis = ["🎉","❤️","🥰"];
  for(let j=0;j<5;j++){
    const e = document.createElement("span");
    e.className = "emoji";
    e.innerText = emojis[Math.floor(Math.random()*emojis.length)];
    e.style.left = (container.offsetWidth/2 + Math.random()*100-50) + "px";
    e.style.top = (container.offsetHeight/2 + Math.random()*50-25) + "px";
    container.appendChild(e);
    setTimeout(()=>container.removeChild(e),2000);
  }

  // Μήνυμα "Happy Birthday Alyssa 🎉❤️" τυχαία γύρω από hamster
  const msg = document.createElement("span");
  msg.innerText = "Happy Birthday Alyssa 🎉❤️";
  msg.style.position = "absolute";
  msg.style.color = "#fff";
  msg.style.fontSize = "14px";
  const offsetX = Math.random()*100-50;
  const offsetY = Math.random()*100-50;
  msg.style.left = (container.offsetWidth/2 + offsetX) + "px";
  msg.style.top = (container.offsetHeight/2 + offsetY) + "px";
  container.appendChild(msg);
  setTimeout(()=>container.removeChild(msg),1500);
}

function secondClick() {
  const chat = document.getElementById("chat");
  chat.style.display = "flex";
  document.getElementById("btn2").style.display = "none";

  const messages = [
    "Happy Birthday Alyssa 🎉❤️",
    "You mean so much to me 🥰",
    "Even from far away, you make me happy",
    "I wish I could be there with you today",
    "Hope your day is full of smiles and joy! 🌸"
  ];

  let i = 0;

  function typeMessageLetterByLetter(text, callback) {
    const bubble = document.createElement("div");
    bubble.className = "bubble me";
    chat.appendChild(bubble);
    bubble.style.opacity = 1;

    let index = 0;
    function typeNextLetter() {
      if(index < text.length){
        bubble.innerText += text.charAt(index);
        index++;
        setTimeout(typeNextLetter,50);
      }else{
        callback();
      }
    }
    typeNextLetter();
  }

  function sendMessage() {
    if(i<messages.length){
      typeMessageLetterByLetter(messages[i], ()=>{
        i++;
        setTimeout(sendMessage,500);
      });
    }
  }

  sendMessage();
}

// Confetti
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;
window.addEventListener('resize',()=>{ canvas.width = window.innerWidth; canvas.height = window.innerHeight; });

let pieces = [];
const colors=["#ff4d6d","#ffb347","#ff69b4","#ff99cc"];
function createPiece(){ return {x:Math.random()*canvas.width,y:Math.random()*-canvas.height,size:Math.random()*8+4,speed:Math.random()*3+2,color:colors[Math.floor(Math.random()*colors.length)]}; }
function startConfetti(){ pieces=[]; for(let i=0;i<150;i++) pieces.push(createPiece()); animate(); }
function animate(){ ctx.clearRect(0,0,canvas.width,canvas.height); pieces.forEach(p=>{p.y+=p.speed;if(p.y>canvas.height)p.y=-10;ctx.fillStyle=p.color;ctx.fillRect(p.x,p.y,p.size,p.size); }); requestAnimationFrame(animate); }
</script>

</body>
</html>
